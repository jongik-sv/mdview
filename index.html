<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>mdview</title>
  </head>

  <body>
    <div id="toolbar">
      <button class="icon-btn" id="btn-tree" title="파일 트리 (프로젝트 없으면 폴더 열기)">
        <!-- hamburger icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div id="tab-bar"></div>
      <div id="controls">
        <button class="icon-btn" id="btn-font-dec" title="글자 작게 (A−)">A−</button>
        <button class="font-readout" id="font-readout" title="클릭하면 기본 크기로">16</button>
        <button class="icon-btn" id="btn-font-inc" title="글자 크게 (A+)">A+</button>
        <button class="icon-btn" id="source-toggle" title="소스 보기">
          <!-- </> code icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
        <button class="icon-btn" id="search-toggle" title="검색 (⌘F)">
          <!-- magnifier icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="divider"></div>
        <div id="theme-toggle">
          <button class="icon-btn" data-mode="light" title="라이트 모드">
            <!-- sun -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
          <button class="icon-btn" data-mode="dark" title="다크 모드">
            <!-- moon crescent -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn" data-mode="system" title="시스템 테마">
            <!-- monitor -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </button>
        </div>
        <div class="divider"></div>
        <button class="icon-btn" id="btn-recent" title="최근 열기">
          <!-- clock / history icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-pdf" title="PDF로 저장 (⌘P)">
          <!-- document-download icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="12" x2="12" y2="18"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-copy-path" title="전체 경로 복사">
          <!-- clipboard-copy icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-open" title="파일 열기 (+)">+</button>
      </div>
    </div>
    <!-- Project mode: md-only file tree (hidden unless a folder is open) -->
    <aside id="sidebar" hidden>
      <div id="sidebar-header">
        <span id="sidebar-title"></span>
        <button class="icon-btn" id="sidebar-open-folder" title="다른 폴더 열기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>
      <!-- 트리/검색 탭 — 검색 상태는 탭을 오가도 유지된다 -->
      <div id="sidebar-tabs" role="tablist">
        <button class="stab active" id="stab-tree" role="tab" aria-selected="true" aria-controls="tree">트리</button>
        <button class="stab" id="stab-search" role="tab" aria-selected="false" aria-controls="search-panel">검색</button>
      </div>
      <div id="tree"></div>
      <!-- 폴더 하위 전체 검색 패널 — 검색 탭이 열리면 #tree를 대신한다 -->
      <div id="search-panel" hidden>
        <div id="sp-head">
          <span id="sp-scope"></span>
        </div>
        <input id="sp-input" type="text" placeholder="하위 폴더 전체 검색" spellcheck="false" autocomplete="off" />
        <div id="sp-status"></div>
        <div id="sp-results"></div>
      </div>
      <div id="sidebar-resize" title="크기 조절"></div>
    </aside>
    <article id="content" class="markdown-body"></article>
    <div id="editor" hidden></div>

    <!-- Recent-files dropdown (anchored under the clock button) -->
    <div id="recent-menu" hidden></div>

    <!-- Custom find widget (rendered view), VS Code-like -->
    <div id="search-bar" hidden>
      <input id="search-input" type="text" placeholder="검색" spellcheck="false" autocomplete="off" />
      <span id="search-counter"></span>
      <button class="search-btn" id="search-prev" title="이전 (Shift+Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
      <button class="search-btn" id="search-next" title="다음 (Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <button class="search-btn" id="search-close" title="닫기 (Esc)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
