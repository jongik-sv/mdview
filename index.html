<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>mdview</title>
  </head>

  <body>
    <div id="toolbar">
      <button class="icon-btn" id="btn-tree" title="нҢҢмқј нҠёлҰ¬ (н”„лЎңм қнҠё м—Ҷмңјл©ҙ нҸҙлҚ” м—ҙкё°)">
        <!-- hamburger icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div id="tab-bar"></div>
      <div id="controls">
        <button class="icon-btn" id="btn-font-dec" title="кёҖмһҗ мһ‘кІҢ (AвҲ’)">AвҲ’</button>
        <button class="font-readout" id="font-readout" title="нҒҙлҰӯн•ҳл©ҙ кё°ліё нҒ¬кё°лЎң">16</button>
        <button class="icon-btn" id="btn-font-inc" title="кёҖмһҗ нҒ¬кІҢ (A+)">A+</button>
        <button class="icon-btn" id="source-toggle" title="мҶҢмҠӨ ліҙкё°">
          <!-- </> code icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
        <button class="icon-btn" id="search-toggle" title="кІҖмғү (вҢҳF)">
          <!-- magnifier icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="divider"></div>
        <div id="theme-toggle">
          <button class="icon-btn" data-mode="light" title="лқјмқҙнҠё лӘЁл“ң">
            <!-- sun -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
          <button class="icon-btn" data-mode="dark" title="лӢӨнҒ¬ лӘЁл“ң">
            <!-- moon crescent -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn" data-mode="system" title="мӢңмҠӨн…ң н…Ңл§Ҳ">
            <!-- monitor -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </button>
        </div>
        <div class="divider"></div>
        <button class="icon-btn" id="btn-pdf" title="PDFлЎң м ҖмһҘ (вҢҳP)">
          <!-- document-download icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="12" x2="12" y2="18"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-open" title="нҢҢмқј м—ҙкё° (+)">+</button>
      </div>
    </div>
    <!-- Project mode: md-only file tree (hidden unless a folder is open) -->
    <aside id="sidebar" hidden>
      <div id="sidebar-header">
        <span id="sidebar-title"></span>
        <span id="sidebar-actions">
          <button class="icon-btn" id="btn-reveal" title="нҳ„мһ¬ л¬ём„ңлҘј нҠёлҰ¬м—җм„ң н‘ңмӢң" disabled>
            <!-- crosshair / target icon -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="7"/>
              <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
              <line x1="12" y1="2" x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="5" y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
            </svg>
          </button>
          <button class="icon-btn" id="sidebar-open-folder" title="лӢӨлҘё нҸҙлҚ” м—ҙкё°">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </span>
      </div>
      <!-- нҠёлҰ¬/кІҖмғү нғӯ вҖ” кІҖмғү мғҒнғңлҠ” нғӯмқ„ мҳӨк°ҖлҸ„ мң м§ҖлҗңлӢӨ -->
      <div id="sidebar-tabs" role="tablist">
        <button class="stab active" id="stab-tree" role="tab" aria-selected="true" aria-controls="tree">нҠёлҰ¬</button>
        <button class="stab" id="stab-search" role="tab" aria-selected="false" aria-controls="search-panel" title="кІҖмғү (F3)">кІҖмғү</button>
      </div>
      <div id="tree"></div>
      <!-- нҸҙлҚ” н•ҳмң„ м „мІҙ кІҖмғү нҢЁл„җ вҖ” кІҖмғү нғӯмқҙ м—ҙлҰ¬л©ҙ #treeлҘј лҢҖмӢ н•ңлӢӨ -->
      <div id="search-panel" hidden>
        <div id="sp-head">
          <span id="sp-scope"></span>
        </div>
        <input id="sp-input" type="text" placeholder="н•ҳмң„ нҸҙлҚ” м „мІҙ кІҖмғү" spellcheck="false" autocomplete="off" />
        <div id="sp-status"></div>
        <div id="sp-results"></div>
      </div>
      <!-- мөңк·ј м—° нҢҢмқј/нҸҙлҚ” нһҲмҠӨнҶ лҰ¬ вҖ” нҠёлҰ¬/кІҖмғү м•„лһҳ кі м • м„№м…ҳ (мөңлҢҖ 10к°ң, мҠӨнҒ¬лЎӨ).
           нҢҢмқј/нҸҙлҚ”лҠ” н•ң м ҖмһҘмҶҢлҘј м“°кі  нғӯмңјлЎң лӮҳлҲ  ліёлӢӨ. -->
      <div id="history">
        <div id="history-resize" title="нҒ¬кё° мЎ°м Ҳ"></div>
        <div id="history-head">
          <div id="history-tabs" role="tablist" aria-label="нһҲмҠӨнҶ лҰ¬ мў…лҘҳ">
            <button class="history-tab active" data-kind="file" role="tab" aria-selected="true">нҢҢмқј</button>
            <button class="history-tab" data-kind="folder" role="tab" aria-selected="false">нҸҙлҚ”</button>
          </div>
          <!-- нңҙм§ҖнҶө = мӮӯм ң. X(лӢ«кё°)лҠ” нҢЁл„җмқ„ лӢ«лҠ” кІғмңјлЎң мқҪнҳҖм„ң мқҳлҜёк°Җ м–ҙкёӢлӮңлӢӨ. -->
          <button class="icon-btn" id="history-clear" title="нҢҢмқј кё°лЎқ м§Җмҡ°кё°">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/>
              <path d="M8 6V4.5A1.5 1.5 0 0 1 9.5 3h5A1.5 1.5 0 0 1 16 4.5V6"/>
              <path d="M18.5 6l-.9 13a2 2 0 0 1-2 1.9H8.4a2 2 0 0 1-2-1.9L5.5 6"/>
              <path d="M10 10.5v6M14 10.5v6"/>
            </svg>
          </button>
        </div>
        <div id="history-list"></div>
      </div>
      <div id="sidebar-resize" title="нҒ¬кё° мЎ°м Ҳ"></div>
    </aside>
    <article id="content" class="markdown-body"></article>
    <div id="editor" hidden></div>

    <!-- Custom find widget (rendered view), VS Code-like -->
    <div id="search-bar" hidden>
      <input id="search-input" type="text" placeholder="кІҖмғү" spellcheck="false" autocomplete="off" />
      <span id="search-counter"></span>
      <button class="search-btn" id="search-prev" title="мқҙм „ (Shift+Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
      <button class="search-btn" id="search-next" title="лӢӨмқҢ (Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <button class="search-btn" id="search-close" title="лӢ«кё° (Esc)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
